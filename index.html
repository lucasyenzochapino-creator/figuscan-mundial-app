<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FiguScan Mundial</title>
  <meta name="theme-color" content="#D4AF37" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=57" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png?v=57" />
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png?v=57" />
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png?v=57" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FiguScan" />
  <link rel="stylesheet" href="styles.css?v=57" />
  <link rel="stylesheet" href="scanner-fix.css?v=60" />
  <style>
    .fs-shutter-hotspot{display:none!important;visibility:hidden!important;pointer-events:none!important}
    iframe,iframe[src*="vercel"],iframe[title*="Vercel"],[data-vercel-toolbar],[class*="vercel" i],[id*="vercel" i],button[aria-label*="Vercel" i]{display:none!important;visibility:hidden!important;pointer-events:none!important;opacity:0!important;width:0!important;height:0!important;max-width:0!important;max-height:0!important}
    input.fs-code-input{text-transform:uppercase!important;-webkit-text-security:none!important}
    .fs-code-help{display:block;margin-top:7px;color:#FFD96A;font-weight:900;font-size:13px;line-height:1.25}
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@6/dist/tesseract.min.js" defer></script>
  <script src="app.js?v=57" defer></script>
  <script>
    (function(){
      function clean(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
      function hasNumberLabel(el){
        var box=el.closest('.field')||el.parentElement;
        var text=clean((box&&box.textContent)||'');
        return text.indexOf('numero de figurita')>-1||text.indexOf('número de figurita')>-1||text.indexOf('figurita')>-1;
      }
      function isNumberInput(i){
        if(!i||i.tagName!=='INPUT')return false;
        var t=clean((i.name||'')+' '+(i.id||'')+' '+(i.placeholder||'')+' '+(i.getAttribute('aria-label')||'')+' '+(i.getAttribute('inputmode')||''));
        var ph=clean(i.placeholder||'');
        var label='';
        if(i.id){try{var l=document.querySelector('label[for="'+CSS.escape(i.id)+'"]'); if(l) label=clean(l.textContent);}catch(e){}}
        return i.type==='number'||ph==='ej 24'||ph.indexOf('ej 24')>-1||t.indexOf('numero')>-1||t.indexOf('número')>-1||t.indexOf('figurita')>-1||label.indexOf('numero')>-1||label.indexOf('figurita')>-1||hasNumberLabel(i);
      }
      function countryCode(){
        var txt=''; document.querySelectorAll('select,.active,[aria-selected="true"],button').forEach(function(x){txt+=' '+(x.textContent||'')+' '+(x.value||'');});
        var m=txt.match(/\b[A-Z]{3}\b/); if(m) return m[0]; txt=clean(txt);
        if(txt.indexOf('argentina')>-1)return'ARG'; if(txt.indexOf('brasil')>-1)return'BRA'; if(txt.indexOf('sudafrica')>-1)return'RSA'; if(txt.indexOf('espana')>-1)return'ESP'; if(txt.indexOf('francia')>-1)return'FRA'; if(txt.indexOf('alemania')>-1)return'GER'; if(txt.indexOf('italia')>-1)return'ITA'; if(txt.indexOf('uruguay')>-1)return'URU'; if(txt.indexOf('mexico')>-1)return'MEX'; if(txt.indexOf('portugal')>-1)return'POR'; if(txt.indexOf('inglaterra')>-1)return'ENG'; if(txt.indexOf('japon')>-1)return'JPN'; if(txt.indexOf('canada')>-1)return'CAN'; return'';
      }
      function makeTextInput(i){
        try{i.type='text';}catch(e){}
        i.setAttribute('type','text');
        i.setAttribute('inputmode','text');
        i.inputMode='text';
        i.autocapitalize='characters';
        i.setAttribute('autocomplete','off');
        i.setAttribute('autocorrect','off');
        i.setAttribute('spellcheck','false');
        i.placeholder='Ej: ARG 10';
        i.classList.add('fs-code-input');
        var box=i.closest('.field')||i.parentElement;
        if(box){
          var lab=box.querySelector('label');
          if(lab&&clean(lab.textContent).indexOf('figurita')>-1) lab.textContent='País + número de figurita';
          if(!box.querySelector('.fs-code-help')){
            var small=document.createElement('small');
            small.className='fs-code-help';
            small.textContent='Escribí el código del país y número. Ej: ARG 10, BRA 4, RSA 4';
            i.insertAdjacentElement('afterend',small);
          }
        }
      }
      function fixInputs(){
        document.querySelectorAll('.fs-shutter-hotspot').forEach(function(x){x.remove();});
        document.querySelectorAll('input').forEach(function(i){
          if(!isNumberInput(i)) return;
          makeTextInput(i);
          if(!i.dataset.fsCodeReady){
            i.dataset.fsCodeReady='1';
            i.addEventListener('focus',function(){makeTextInput(i);},true);
            i.addEventListener('pointerdown',function(){makeTextInput(i);},true);
            i.addEventListener('touchstart',function(){makeTextInput(i);},true);
            i.addEventListener('input',function(){var p=i.selectionStart; i.value=String(i.value).toUpperCase(); try{i.setSelectionRange(p,p)}catch(e){};},true);
          }
        });
        removeVercelButton();
      }
      function beforeSave(){
        var i=Array.from(document.querySelectorAll('input')).find(isNumberInput); if(!i) return;
        makeTextInput(i);
        var v=String(i.value||'').trim().toUpperCase();
        if(/^[A-Z]{3}\s*\d+$/.test(v)){i.value=v.replace(/\s+/,' ');} else if(/^\d+$/.test(v)){var c=countryCode(); if(c) i.value=c+' '+v;}
        i.dispatchEvent(new Event('input',{bubbles:true})); i.dispatchEvent(new Event('change',{bubbles:true}));
      }
      var lastBeep=0;
      function beep(){
        var now=Date.now(); if(now-lastBeep<450)return; lastBeep=now;
        try{var C=window.AudioContext||window.webkitAudioContext;var a=new C();var o=a.createOscillator();var g=a.createGain();o.frequency.value=1150;g.gain.value=.22;o.connect(g);g.connect(a.destination);o.start();setTimeout(function(){try{o.stop();a.close()}catch(e){}},110)}catch(e){}
        try{navigator.vibrate&&navigator.vibrate(45)}catch(e){}
      }
      function removeVercelButton(){
        document.querySelectorAll('iframe,[data-vercel-toolbar],[class*="vercel" i],[id*="vercel" i],button,div').forEach(function(el){
          try{
            var cs=getComputedStyle(el), r=el.getBoundingClientRect(), label=(el.getAttribute('aria-label')||'')+' '+(el.title||'')+' '+(el.textContent||'');
            var looksVercel=/vercel|deployment|toolbar/i.test(label);
            var rightFloat=cs.position==='fixed'&&r.width>20&&r.width<90&&r.height>20&&r.height<90&&r.right>window.innerWidth-95&&r.top>80&&r.top<window.innerHeight-90;
            if(looksVercel||rightFloat){el.style.display='none';el.style.visibility='hidden';el.style.pointerEvents='none';}
          }catch(e){}
        });
      }
      document.addEventListener('focusin',function(e){if(isNumberInput(e.target))makeTextInput(e.target);},true);
      document.addEventListener('pointerdown',function(e){if(isNumberInput(e.target))makeTextInput(e.target);var b=e.target.closest('button,.btn,[role="button"]'); if(!b)return; var t=clean(b.textContent); if(t.indexOf('sacar foto')>-1||t.indexOf('guardar imagen')>-1||t.indexOf('capturar')>-1)beep();},true);
      document.addEventListener('click',function(e){var b=e.target.closest('button,.btn,[role="button"]'); if(!b)return; var t=clean(b.textContent); if(t.indexOf('guardar')>-1||t.indexOf('agregar')>-1||t.indexOf('confirmar')>-1) beforeSave(); if(t.indexOf('sacar foto')>-1||t.indexOf('guardar imagen')>-1||t.indexOf('capturar')>-1) beep();},true);
      document.addEventListener('submit',beforeSave,true);
      new MutationObserver(fixInputs).observe(document.documentElement,{childList:true,subtree:true,attributes:true,attributeFilter:['type','inputmode','placeholder','class','style']});
      setInterval(fixInputs,700);
      if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',fixInputs);else fixInputs();
    })();
  </script>
  <script src="hotfix.txt?v=60" defer></script>
  <script>
    window.addEventListener('error', function(){
      setTimeout(function(){
        var root = document.getElementById('app');
        if(root && !root.innerHTML.trim()){
          root.innerHTML = '<main style="min-height:100vh;background:#05070d;color:white;padding:24px;font-family:system-ui"><h1>FiguScan</h1><p>La app no cargó correctamente. Actualizá la página o borrá caché.</p></main>';
        }
      }, 500);
    });
  </script>
</body>
</html>
